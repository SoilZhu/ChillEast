name: ChillEast
description: 自在东湖 - 校园服务 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Network
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  
  # WebView
  flutter_inappwebview: ^6.0.0
  
  # Storage
  flutter_secure_storage: ^9.0.0
  
  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.7.4
  shared_preferences: ^2.2.2
  
  # HTML Parser
  html: ^0.15.4
  
  # ICS Calendar
  icalendar_parser: ^2.0.0
  
  # File & Share
  path_provider: ^2.1.1
  path: ^1.8.3
  share_plus: ^7.2.1
  permission_handler: ^11.1.0
  
  # Utils
  intl: ^0.19.0
  logger: ^2.0.2+1
  geolocator: ^14.0.2
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.3.2
  mobile_scanner: ^5.1.1
  image_picker: ^1.0.7
  package_info_plus: ^9.0.1
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/app_icon.png"
  android: true
  ios: false
  
  color_dark: "#121212"
  image_dark: "assets/images/app_icon.png"
  
  android_12:
    color: "#FFFFFF"
    image: "assets/images/app_icon.png"
    color_dark: "#121212"
    image_dark: "assets/images/app_icon.png"
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#121212"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/app_icon.png

  
  # fonts:
  #   - family: HUNAUIcons
  #     fonts:
  #       - asset: assets/fonts/hunau_icons.ttf
